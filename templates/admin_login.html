<!DOCTYPE html>
<html class="light" lang="en"><head>
{% set page_title = "Admin — Healio" %}
{% include "_stitch_head.html" %}
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop relative overflow-hidden">
<div class="absolute top-[-10%] right-[-5%] w-96 h-96 bg-primary-fixed-dim/20 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-80 h-80 bg-surface-container-high/30 rounded-full blur-3xl"></div>
<div class="w-full max-w-[440px] z-10">
<div class="flex flex-col items-center mb-lg">
<img class="h-14 w-auto object-contain mb-sm" src="{{ url_for('static', filename='images/logo.jpg') }}" alt="Healio"/>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">Admin</h1>
</div>
<div class="login-card-backdrop border border-outline-variant rounded-xl overflow-hidden soft-elevation">
<div class="clinical-gradient px-lg py-xl text-center">
<h2 class="font-headline-lg-mobile md:font-headline-lg text-white mb-xs">Admin Access</h2>
<p class="text-primary-fixed font-body-sm opacity-90">Enter the admin password to manage doctor accounts</p>
</div>
<div class="p-lg space-y-md">
{% include "_stitch_flash.html" %}
<form method="POST">
<div class="space-y-xs">
<label class="block font-label-md text-on-surface-variant ml-1" for="password">Admin Password</label>
<div class="relative flex items-center group input-focus-ring border border-outline-variant bg-surface-container-lowest rounded-lg transition-all duration-200">
<div class="pl-md pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full h-[48px] bg-transparent border-none focus:ring-0 px-md font-body-md text-on-surface placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" type="password" autofocus="" required/>
</div>
</div>
<div class="pt-md">
<button class="w-full h-[48px] bg-primary text-white font-label-md rounded-full hover:bg-primary-container active:scale-[0.98] transition-all duration-150 flex items-center justify-center space-x-2 shadow-lg shadow-primary/10" type="submit">
<span>Enter</span>
<span class="material-symbols-outlined text-[18px]">login</span>
</button>
</div>
</form>
</div>
</div>
</div>
</main>
<footer class="p-md text-center">
<p class="font-label-sm text-outline">© 2026 Healio Health Systems. All rights reserved.</p>
</footer>
</body></html>
