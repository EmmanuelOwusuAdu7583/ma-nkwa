<header class="fixed top-0 w-full z-50 bg-background border-b border-outline-variant flex justify-between items-center px-margin-mobile h-16">
<div class="flex items-center gap-3">
<img class="h-8 w-auto object-contain" src="{{ url_for('static', filename='images/logo.jpg') }}" alt="Ma Nkwa"/>
</div>
<div class="flex items-center gap-2">
<a class="relative material-symbols-outlined text-primary p-2 rounded-full hover:bg-primary-container/10 transition-colors" data-icon="notifications" href="{{ url_for('patient_notifications') }}" aria-label="Notifications">
notifications
{% if unread_notifications_count %}
<span class="absolute top-1 right-1 w-2 h-2 rounded-full bg-error"></span>
{% endif %}
</a>
<a class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden border-2 border-primary/20" href="{{ url_for('patient_profile') }}" title="Your profile">
{% if session.patient_photo %}
<img class="w-full h-full object-cover" src="{{ url_for('serve_upload', filename=session.patient_photo) }}" alt="{{ session.patient_name }}'s profile photo"/>
{% else %}
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">person</span>
{% endif %}
</a>
</div>
</header>
